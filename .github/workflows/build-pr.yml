# One-off build for a specific llama.cpp PR
name: Build Llama PR

on:
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull Request number'
        required: true
      target:
        description: 'Build target (full, light, server)'
        default: 'full'
        required: true

env:
  UPSTREAM_REPO: ggerganov/llama.cpp
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout llama.cpp PR
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: pull/${{ github.event.inputs.pr }}/head
          fetch-depth: 0
          path: llama.cpp

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${{ github.repository_owner }}/llama-cpp"
          PR_NUM="${{ github.event.inputs.pr }}"
          TARGET="${{ github.event.inputs.target }}"
          
          # Generate dynamic tag: e.g., ghcr.io/owner/llama-cpp:full-pr24423
          # We include the target in the name as requested.
          TAG="${IMAGE_REPO}:${TARGET}-pr${PR_NUM}"
          
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: llama.cpp
          file: llama.cpp/.devops/cuda.Dockerfile
          target: ${{ github.event.inputs.target }}
          tags: ${{ steps.meta.outputs.tag }}
          push: true
          provenance: false
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=pr-${{ github.event.inputs.pr }}
            APP_REVISION=head
            IMAGE_URL=https://github.com/${{ env.UPSTREAM_REPO }}
            IMAGE_SOURCE=https://github.com/${{ env.UPSTREAM_REPO }}
            CUDA_VERSION=12.8.1
            UBUNTU_VERSION=24.04
            CUDA_DOCKER_ARCH=86;89;90
          cache-from: type=registry,ref=${{ steps.meta.outputs.image_repo }}:buildcache-${{ github.event.inputs.target }}-amd64
          cache-to: type=registry,ref=${{ steps.meta.outputs.image_repo }}:buildcache-${{ github.event.inputs.target }}-amd64,mode=max
