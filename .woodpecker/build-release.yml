# Builds and pushes llama.cpp CUDA Docker images for the release tag recorded
# in last_release_version.txt.
#
# Triggered by any push to main.
#
# Requirements on the Woodpecker side:
#   - Secrets: ghcr_username, ghcr_token (PAT with write:packages).

when:
  - event: push
    branch: main

matrix:
  include:
    - CUDA_SUFFIX: cuda12
      CUDA_VERSION: 12.8.1
      # cuda12 is also published under the unsuffixed "server-cuda" alias.
      ALIAS_TAG: server-cuda
    - CUDA_SUFFIX: cuda13
      CUDA_VERSION: 13.3.0
      ALIAS_TAG: ''

steps:
  prepare-source:
    image: alpine/git:2.49.1
    environment:
      UPSTREAM_REPO: ggerganov/llama.cpp
    commands:
      - RELEASE_TAG="$(cat last_release_version.txt)"
      - git clone --depth 1 --branch "$RELEASE_TAG" "https://github.com/$UPSTREAM_REPO.git" llama.cpp
      - |
        set -eu
        BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        COMMIT_SHA="$(git -C llama.cpp rev-parse HEAD)"

        {
          echo "server-$CUDA_SUFFIX"
          echo "server-$CUDA_SUFFIX-$RELEASE_TAG"
        } > .tags

        if [ -n "$ALIAS_TAG" ]; then
          {
            echo "$ALIAS_TAG"
            echo "$ALIAS_TAG-$RELEASE_TAG"
          } >> .tags
        fi

        {
          echo "BUILD_DATE=$BUILD_DATE"
          echo "APP_VERSION=$RELEASE_TAG"
          echo "APP_REVISION=$COMMIT_SHA"
          echo "IMAGE_URL=https://github.com/$UPSTREAM_REPO"
          echo "IMAGE_SOURCE=https://github.com/$UPSTREAM_REPO"
          echo "CUDA_VERSION=$CUDA_VERSION"
          echo "CUDA_DOCKER_ARCH=86;89;90"
        } > .kaniko.env

  build-and-push:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: edwardjxli/llama-cpp
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token
      context: llama.cpp
      dockerfile: llama.cpp/.devops/cuda.Dockerfile
      target: server
      extra_opts: --custom-platform=linux/amd64
      cache: true
      cache_repo: edwardjxli/llama-cpp/buildcache-$CUDA_SUFFIX-amd64
      env_file: .kaniko.env
      build_args_from_env:
        - BUILD_DATE
        - APP_VERSION
        - APP_REVISION
        - IMAGE_URL
        - IMAGE_SOURCE
        - CUDA_VERSION
        - CUDA_DOCKER_ARCH
